<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Caza Estrellas</title>

    <link rel="stylesheet" href="limones.css">

</head>

<body onload="iniciar()">
     

    <div class="contenedor">
      <div class="logo">
       <img src="FB93A604-09A4-48FF-B368-E75D6C3976B2.PNG" alt="Logo Octopus Gaming">
     </div>

        <header>

            <h1>🍋 Atrapar Limones</h1>

            <p class="descripcion">
                Si del cielo te caen limones...
                ¡Atrápalos antes de que toquen el suelo!
            </p>

            <p class="autor">Daniel Orrala</p>

        </header>

        <div class="panel">

            <div class="tarjeta">

                <span class="titulo">🏆 Puntaje</span>

                <span id="txtPuntaje">0</span>

            </div>

            <div class="tarjeta">

                <span class="titulo">❤️ Vidas</span>

                <span id="txtVidas">5</span>

            </div>

        </div>

        <div class="zonaJuego">

            <canvas id="areaJuegos" width="600" height="400"></canvas>

        </div>

        <div class="botones">

            <button onclick="moverIzquierda()">⬅ Izquierda</button>

            <button onclick="moverDerecha()">Derecha ➡</button>
        </div>
        <div class="botones">

            <button class="reiniciar" onclick="reiniciar()">
                🔄 Reiniciar
            </button>
            <button class="aleatorio" id="btnAleatorio" onclick="probarAleatorio()">
             <span id="contadorAleatorio">
                3 
            </span>
            <br>
                aleatorio 
            </br>
            </button>

        </div>

    </div> 

</body>

<script src="limones.js"></script>
<script src="utils.js"></script>

</html>
